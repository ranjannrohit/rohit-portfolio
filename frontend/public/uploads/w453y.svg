<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Animated gradient -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee">
        <animate attributeName="stop-color" values="#22d3ee;#3b82f6;#22d3ee" dur="8s" repeatCount="indefinite"></animate>
      </stop>
      <stop offset="100%" stop-color="#3b82f6">
        <animate attributeName="stop-color" values="#3b82f6;#22d3ee;#3b82f6" dur="8s" repeatCount="indefinite"></animate>
      </stop>
    </linearGradient>

    <!-- Soft glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="coloredBlur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0a0a0a"></rect>

  <!-- ROHIT -->
  <text x="960" y="470" text-anchor="middle" font-size="260" font-weight="900" letter-spacing="14" fill="url(#grad)" filter="url(#glow)" font-family="Inter, Arial, sans-serif">
    ROHIT
  </text>

  <!-- RANJAN -->
  <text x="960" y="730" text-anchor="middle" font-size="240" font-weight="800" letter-spacing="12" fill="#e5e7eb" opacity="0.9" font-family="Inter, Arial, sans-serif">
    RANJAN
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -6" dur="6s" repeatCount="indefinite" direction="alternate"></animateTransform>
  </text>

</svg>
